<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Presenza Direttore</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css"
    />

    <style>
      html,
      body {
        touch-action: none;
        margin: 0;
        padding: 0;
        height: 100vh;
        background-color: #e0e0e0;
      }

      .status-bar {
        transition: background-color 0.3s ease;
        background-color: #ff9800;
      }

      #main {
        background-color: #e0e0e0;
      }

      #statusMain {
        font-size: 5rem;
        font-weight: bold;
        color: #424242;
        text-align: center;
        line-height: 1.15;
      }
    </style>
  </head>
  <body>
    <div class="columns is-gapless is-multiline" style="height: 100vh; margin: 0">
      <div
        class="status-bar column is-12 is-flex is-align-items-center is-justify-content-center"
        style="height: 15vh"
        id="topPanel"
      >
        <p class="title mb-0 has-text-white" id="workspaceName" style="font-size: 3rem">
          Ufficio Direttore
        </p>
      </div>
      <div
        class="column is-12 is-flex is-flex-direction-column is-justify-content-center is-align-items-center"
        style="height: 70vh"
        id="main"
      >
        <p id="statusMain">Direttore Assente</p>
      </div>
      <div
        class="status-bar column is-12 is-flex is-align-items-center is-justify-content-center"
        style="height: 15vh"
        id="bottomPanel"
      >
        <p class="title mb-0 has-text-white" id="roomStatus" style="font-size: 3.5rem">
          Direttore Assente
        </p>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
