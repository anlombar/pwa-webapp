<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Presenza Direttore</title>
    <style>
      html,
      body {
        overflow: hidden;
        margin: 0;
        padding: 0;
        height: 100vh;
        width: 100vw;
        touch-action: none;
        font-family: Arial, sans-serif;
        background-color: #e0e0e0;
      }

      .layout {
        display: flex;
        flex-direction: column;
        height: 100vh;
        width: 100vw;
      }

      .status-bar {
        height: 15vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #ff9800;
      }

      .status-bar .title {
        margin: 0;
        color: #ffffff;
        font-size: 3rem;
        font-weight: bold;
        text-align: center;
      }

      #main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #e0e0e0;
      }

      .access-btn {
        appearance: none;
        -webkit-appearance: none;
        border: none;
        border-radius: 16px;
        width: 54vw;
        height: 24vh;
        box-sizing: border-box;
        padding: 2vh 3vw;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        background-color: #9e9e9e;
      }

      .access-btn .btn-label {
        font-size: 3.2vw;
        font-weight: bold;
        line-height: 1.25;
      }
    </style>
  </head>
  <body>
    <motion class="layout">
      <div class="status-bar" id="topPanel">
        <p class="title">Ufficio Direttore</p>
      </div>
      <motion id="main">
        <button type="button" class="access-btn" id="accessButton" aria-live="polite">
          <span class="btn-label" id="accessButtonLabel">Divieto di Accesso</span>
        </button>
      </div>
      <div class="status-bar" id="bottomPanel">
        <p class="title" id="roomStatus">Direttore Assente</p>
      </div>
    </div>

    <script src="script.js?v=5"></script>
  </body>
</html>
