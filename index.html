<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Presenza Direttore</title>
    <style>
      html,
      body {
        overflow: hidden;
        margin: 0;
        padding: 0;
        height: 100vh;
        width: 100vw;
        touch-action: none;
        font-family: Arial, sans-serif;
        background-color: #e0e0e0;
      }

      .layout {
        position: relative;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
      }

      .status-bar {
        position: absolute;
        left: 0;
        right: 0;
        height: 15vh;
        width: 100%;
        display: table;
        background-color: #ff9800;
      }

      .status-bar-inner {
        display: table-cell;
        vertical-align: middle;
        text-align: center;
      }

      .status-bar .title {
        margin: 0;
        color: #ffffff;
        font-size: 3rem;
        font-weight: bold;
        line-height: 1.1;
      }

      #topPanel {
        top: 0;
      }

      #bottomPanel {
        bottom: 0;
      }

      #main {
        position: absolute;
        top: 15vh;
        left: 0;
        right: 0;
        height: 70vh;
        width: 100%;
        background-color: #e0e0e0;
        display: table;
      }

      #main-inner {
        display: table-cell;
        vertical-align: middle;
        text-align: center;
      }

      .access-btn {
        appearance: none;
        -webkit-appearance: none;
        border: none;
        border-radius: 16px;
        width: 54vw;
        height: 24vh;
        box-sizing: border-box;
        padding: 0 3vw;
        margin: 0 auto;
        background-color: #9e9e9e;
      }

      .access-btn .btn-label {
        display: block;
        font-size: 3.2vw;
        font-weight: bold;
        line-height: 24vh;
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <div class="status-bar" id="topPanel">
        <div class="status-bar-inner">
          <p class="title">Ufficio Direttore</p>
        </div>
      </div>
      <div id="main">
        <div id="main-inner">
          <button type="button" class="access-btn" id="accessButton" aria-live="polite">
            <span class="btn-label" id="accessButtonLabel">Divieto di Accesso</span>
          </button>
        </div>
      </div>
      <div class="status-bar" id="bottomPanel">
        <div class="status-bar-inner">
          <p class="title" id="roomStatus">Direttore Assente</p>
        </div>
      </div>
    </div>

    <script src="script.js?v=15"></script>
  </body>
</html>
